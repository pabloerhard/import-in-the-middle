overrides:
  - files:
    - '**/*.{js,cjs,mjs}'

parser: '@babel/eslint-parser'
parserOptions:
  ecmaVersion: latest
  requireConfigFile: false
  sourceType: 'script'
  babelOptions:
    plugins:
      - '@babel/plugin-syntax-import-assertions'

rules:
  "import/first": off

extends:
  - "standard"

ignorePatterns:
  - test/fixtures/circular-a.js
  - test/fixtures/circular-b.js
  - test/fixtures/circular-star-a.mjs
  - test/fixtures/circular-star-b.mjs
  - test/fixtures/self-star-reexport.mjs
  - test/fixtures/reexport.js
  - test/fixtures/duplicate-explicit.mjs
  - test/fixtures/duplicate.mjs
  - test/fixtures/export-types/default-call-expression-renamed.mjs
  - test/fixtures/reexport-same-source.mjs
  - test/fixtures/reexport-explicit-override.mjs
  - test/fixtures/reexport-nested-agg.mjs
